server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Check for v=1 or v=2 in the query string
        if ($arg_v = "1") {
            rewrite ^/$ /index-v1.html break;
        }
        if ($arg_v = "2") {
            rewrite ^/$ /index-v2.html break;
        }
        
        # Default behavior
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    error_page 404 /index.html;
}
